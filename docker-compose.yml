# Base Docker Compose (Production/Standard)
services:
  db:
    image: postgres:16-alpine
    container_name: coffee_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: coffeedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d coffeedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: ./backend
    container_name: coffee_migrate
    environment:
      DATABASE_URL: postgresql+psycopg://user:password@db:5432/coffeedb
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    command: db/migrate.py
    entrypoint: ["python"]

  backend:
    build: ./backend
    container_name: coffee_backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+psycopg://user:password@db:5432/coffeedb
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    image: nginx:alpine
    container_name: coffee_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:


services:
  db:
    image: postgres:16-alpine
    container_name: coffee_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: coffeedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d coffeedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: coffee_backend
    ports:
      - "5001:5000"
    environment:

      DATABASE_URL: postgresql://user:password@db:5432/coffeedb
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: coffee_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html

  seed:
    build: ./backend
    container_name: coffee_seed
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/coffeedb
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: seed_data.py
    entrypoint: ["python"]

volumes:
  postgres_data:

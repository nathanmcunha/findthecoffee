services:
  backend:
    volumes:
      - ./backend:/app
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://user:password@db:5432/coffeedb
      PYTHONPATH: /app
      FLASK_APP: app
    command: python -m flask run --host=0.0.0.0 --port=5000 --debug

  frontend:
    volumes:
      - ./frontend:/usr/share/nginx/html

  seed:
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/coffeedb
      PYTHONPATH: /app

[tools]
python = "3.12"

[env]
_.python.venv = ".venv"
DATABASE_URL = "postgresql+psycopg://user:password@localhost:5432/coffeedb"

[tasks."up:infra"]
description = "Start only the infrastructure (database)"
run = "docker compose -f docker-compose.infra.yml up -d"

[tasks."up:backend"]
description = "Start the backend API with hot-reload"
depends = ["up:infra"]
run = "PYTHONPATH=backend python backend/main.py"

 [tasks."tailwind:download"]
 description = "Download standalone Tailwind CLI library"
 run = """
 if [ ! -f frontend/tailwindcss ]; then
     echo "Downloading Tailwind CLI..."
     curl -sL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o frontend/tailwindcss
     chmod +x frontend/tailwindcss
 fi
 """

 [tasks."tailwind:watch"]
 description = "Watch and compile Tailwind CSS"
 depends = ["tailwind:download"]
 run = "./frontend/tailwindcss -i frontend/input.css -o frontend/style.css --watch"

 [tasks."up:frontend"]
 description = "Serve the frontend and compile CSS"
 depends = ["tailwind:download"]
 run = """
 ./frontend/tailwindcss -i frontend/input.css -o frontend/style.css
 python -m http.server --directory frontend 8080
 """

[tasks.test]
description = "Run pytest suite"
depends = ["up:infra"]
run = "PYTHONPATH=backend python -m pytest backend/tests"

[tasks.dev]
description = "Run backend and frontend in parallel"
depends = ["up:infra", "tailwind:download"]
run = "mise run up:backend & mise run up:frontend & mise run tailwind:watch & wait"
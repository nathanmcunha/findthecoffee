[tools]
python = "3.12"
deno = "latest"

[env]
_.python.venv = ".venv"
DATABASE_URL = "postgresql+psycopg://user:password@localhost:5432/coffeedb"
PYTHONPATH = "backend"
DOCKER_HOST = "unix:///run/user/1000/podman/podman.sock"

[tasks.venv]
description = "Recreate .venv and reinstall deps (run after mise upgrades Python)"
run = """
rm -rf .venv
python -m venv .venv
.venv/bin/pip install -r backend/requirements.txt
"""

[tasks."up:infra"]
description = "Start only the infrastructure (database)"
run = "docker compose -f docker-compose.infra.yml up -d"

[tasks."up:backend"]
description = "Start the backend API with hot-reload"
depends = ["up:infra"]
run = "python backend/main.py"

[tasks."tailwind:download"]
description = "Download standalone Tailwind CLI library"
run = """
if [ ! -f frontend/tailwindcss ]; then
    echo "Downloading Tailwind CLI..."
    curl -sL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o frontend/tailwindcss
    chmod +x frontend/tailwindcss
fi
"""

[tasks."esbuild:download"]
description = "Download standalone esbuild binary"
run = """
if [ ! -f frontend/esbuild ]; then
    echo "Downloading esbuild..."
    curl -sL https://registry.npmjs.org/@esbuild/linux-x64/-/linux-x64-0.25.2.tgz | tar xz --strip-components=2 -C frontend package/bin/esbuild
    chmod +x frontend/esbuild
fi
"""

[tasks."js:lint"]
description = "Lint TypeScript sources with deno lint"
run = "deno lint frontend/src/"

[tasks."ts:check"]
description = "Type-check all TypeScript sources with deno check"
run = "deno check frontend/src/*.ts"

[tasks."js:build"]
description = "Bundle TypeScript → script.js via esbuild"
depends = ["esbuild:download"]
run = "./frontend/esbuild frontend/src/main.ts --bundle --outfile=frontend/script.js"

[tasks."js:watch"]
description = "Watch and rebuild TypeScript on changes"
depends = ["esbuild:download"]
run = "./frontend/esbuild frontend/src/main.ts --bundle --outfile=frontend/script.js --watch"

[tasks."js:format"]
description = "Format TypeScript sources with deno fmt"
run = "deno fmt frontend/src/"

[tasks."js:check"]
description = "Full JS check (eslint + format + type)"
depends = ["js:lint", "js:format", "ts:check"]
run = "echo 'All checks passed'"

[tasks."build:prod"]
description = "Production build with minification"
depends = ["tailwind:download", "esbuild:download", "js:check"]
run = """
./frontend/tailwindcss -i frontend/input.css -o frontend/style.css --minify
./frontend/esbuild frontend/src/main.ts --bundle --minify --sourcemap --outfile=frontend/script.js
"""

[tasks.clean]
description = "Clean build artifacts"
run = """
rm -f frontend/script.js frontend/style.css frontend/tailwindcss frontend/esbuild
rm -rf frontend/dist
"""

[tasks."hooks:install"]
description = "Install git hooks for pre-commit checks"
run = """
git config core.hooksPath .git-hooks
echo "Git hooks installed successfully!"
echo "Pre-commit checks will run on every commit."
"""

[tasks."hooks:uninstall"]
description = "Remove git hooks"
run = """
git config --unset core.hooksPath
echo "Git hooks removed."
"""

[tasks."hooks:run"]
description = "Manually run pre-commit checks"
run = ".git-hooks/pre-commit"

[tasks."tailwind:watch"]
description = "Watch and compile Tailwind CSS"
depends = ["tailwind:download"]
run = "./frontend/tailwindcss -i frontend/input.css -o frontend/style.css --watch"

[tasks."up:frontend"]
description = "Serve the frontend and compile CSS + JS"
depends = ["tailwind:download", "js:build"]
run = """
./frontend/tailwindcss -i frontend/input.css -o frontend/style.css
python -m http.server --directory frontend 8080
"""

[tasks.test]
description = "Run pytest suite"
run = "python -m pytest backend/tests"

[tasks."test:quick"]
description = "Run pytest suite (fast, no coverage)"
run = "python -m pytest backend/tests -x -q"

[tasks."test:quiet"]
description = "Run pytest suite (quiet mode for hooks)"
run = "python -m pytest backend/tests -x -q --tb=no"

[tasks."test:cov"]
description = "Run pytest with coverage report"
run = "python -m pytest backend/tests --cov=backend --cov-report=term-missing"

[tasks."test:cov:html"]
description = "Run pytest with HTML coverage report"
run = "python -m pytest backend/tests --cov=backend --cov-report=html --cov-report=term-missing"

[tasks.dev]
description = "Run backend and frontend in parallel"
depends = ["up:infra", "tailwind:download", "esbuild:download"]
run = "mise run up:backend & mise run up:frontend & mise run tailwind:watch & mise run js:watch & wait"